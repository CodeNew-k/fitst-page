<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名出售页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .domain-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .domain-item:hover {
            background: #eef5ff;
            transform: translateY(-2px);
        }
        .domain-name {
            font-size: 18px;
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 10px;
        }
        .domain-link {
            display: inline-block;
            background: #0066cc;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }
        .domain-link:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>优质域名出售</h1>
        
        <div class="domain-item">
            <div class="domain-name">xchatweb.cn</div>
            <a href="https://mi.aliyun.com/domain-detail?domainCartTradeParams=dr_29379033_1776701218100&domainName=xchatweb.cn&orgType=&productType=2&_v_=47edc66742fe36fc0a839ea5700b8cd5" class="domain-link" target="_blank">查看出售详情</a>
        </div>

        <div class="domain-item">
            <div class="domain-name">xchatai.com.cn</div>
            <a href="https://mi.aliyun.com/domain-detail?domainCartTradeParams=dr_29379033_1776701218100&domainName=xchatai.com.cn&orgType=&productType=2&_v_=47edc66742fe36fc0a839ea5700b8cd5" class="domain-link" target="_blank">查看出售详情</a>
        </div>

        <div class="domain-item">
            <div class="domain-name">xchatapp.com.cn</div>
            <a href="https://mi.aliyun.com/domain-detail?domainCartTradeParams=dr_29379033_1776701218100&domainName=xchatapp.com.cn&orgType=&productType=2&_v_=47edc66742fe36fc0a839ea5700b8cd5" class="domain-link" target="_blank">查看出售详情</a>
        </div>
    </div>
</body>
</html>
